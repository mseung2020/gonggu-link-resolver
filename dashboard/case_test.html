<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>공구왕 링크 해석 모듈</title>
<style>
  :root { color-scheme: dark; }
  body { font-family: -apple-system, "Apple SD Gothic Neo", sans-serif; background:#111; color:#eee; margin:0; }
  header { padding:14px 20px; background:#1b1b1b; border-bottom:1px solid #333; display:flex; gap:20px; align-items:center; position:sticky; top:0; z-index:2; }
  header h1 { font-size:15px; margin:0; font-weight:600; }
  .stats { display:flex; gap:14px; font-size:12px; color:#aaa; }
  .stats b { color:#eee; }
  .filters { display:flex; gap:8px; margin-left:auto; }
  .filters button { background:#2a2a2a; color:#ccc; border:1px solid #3a3a3a; border-radius:6px; padding:4px 10px; font-size:12px; cursor:pointer; }
  .filters button.active { background:#3a5; color:#fff; border-color:#3a5; }
  .dropdown { position:relative; }
  .dropdown-btn { background:#2a2a2a; color:#ccc; border:1px solid #3a3a3a; border-radius:6px; padding:4px 10px; font-size:12px; cursor:pointer; }
  .dropdown-btn.open { background:#3a3a3a; border-color:#555; }
  .dropdown-panel { position:absolute; top:calc(100% + 6px); right:0; background:#1e1e1e; border:1px solid #333;
    border-radius:8px; padding:10px 12px; display:flex; flex-direction:column; gap:10px; min-width:220px;
    box-shadow:0 4px 16px rgba(0,0,0,.45); z-index:5; }
  .toggle-row { display:flex; align-items:center; justify-content:space-between; gap:12px; font-size:12px; color:#ccc; }
  .switch { position:relative; display:inline-block; width:34px; height:18px; flex-shrink:0; }
  .switch input { opacity:0; width:0; height:0; }
  .switch .slider { position:absolute; inset:0; background:#444; transition:.15s; border-radius:18px; cursor:pointer; }
  .switch .slider:before { position:absolute; content:""; height:14px; width:14px; left:2px; bottom:2px;
    background:#ccc; transition:.15s; border-radius:50%; }
  .switch input:checked + .slider { background:#3a5; }
  .switch input:checked + .slider:before { transform:translateX(16px); background:#fff; }
  table { width:100%; border-collapse:collapse; font-size:12.5px; }
  th, td { padding:6px 10px; border-bottom:1px solid #262626; text-align:left; vertical-align:top; }
  th { background:#1b1b1b; position:sticky; top:49px; color:#999; font-weight:500; z-index:1; }
  tr:hover { background:#1a1a1a; }
  .plat { padding:1px 6px; border-radius:4px; font-size:11px; }
  .plat.instagram { background:#4a2350; color:#f0c; }
  .plat.youtube { background:#502020; color:#f55; }
  .status { padding:2px 7px; border-radius:10px; font-size:11px; }
  .status.pending { background:#333; color:#999; }
  .status.in_progress { background:#553d00; color:#fc0; }
  .status.done { background:#0d4b1e; color:#5f5; }
  .status.error { background:#5b1414; color:#f77; }
  .status.unresolved { background:#333d55; color:#9ac; }
  .status.hold { background:#4a3a1a; color:#e0b25a; }
  a { color:#6cf; text-decoration:none; }
  a:hover { text-decoration:underline; }
  .hop { font-size:11px; color:#999; }
  .hop b { color:#ccc; }
  .thumb { width:44px; height:44px; object-fit:cover; border-radius:4px; background:#222; }
  .desc { max-width:280px; color:#bbb; }
  .tag { font-size:11px; color:#888; }
  .updated { color:#666; font-size:11px; white-space:nowrap; }
</style>
</head>
<body>
<header>
  <h1>🔗링크 해석 모듈</h1>
  <div class="stats" id="stats"></div>
  <div class="filters" id="filters"></div>
  <div class="dropdown" id="hideDropdown"></div>
</header>
<table>
  <thead>
    <tr>
      <th>플랫폼</th><th>원본</th><th>제품</th><th>기간</th><th>케이스</th><th>상태</th><th>홉 로그</th><th>최종 결과</th><th>갱신</th>
    </tr>
  </thead>
  <tbody id="rows"></tbody>
</table>
<script>
let currentFilter = 'all';
let hideStageSkipped = true;
let hideNoLink = true;
let hideNotGonggu = true;
let hideAffiliate = true;
let hidePanelOpen = false;

function isStageSkipped(r) {
  const e = r.error || '';
  return e.startsWith('stage=예고') || e.startsWith('stage=마감');
}

function isNoLink(r) {
  const e = r.error || '';
  // link_location이 "댓글참여_DM"/"고정댓글_더보기"라도 프로필에 인포크 등 상시 링크가
  // 따로 있으면 resolver가 실제로 시도한다(2026-07-14 수정) — 그러니 link_location/comment_gated
  // 값만으로 미리 노이즈 처리하지 말고, 실제로 "크롤링할 링크가 없었다"는 gate_check 결과만 본다.
  return e.startsWith('크롤링할 링크 없음') || e.startsWith('urls/profile_urls 없음');
}

function isNotGonggu(r) {
  return r.is_gonggu === false || (r.error || '').startsWith('is_gonggu=false');
}

function isAffiliate(r) {
  return (r.error || '').startsWith('제휴 광고성');
}

function isNoise(r) {
  return isStageSkipped(r) || isNoLink(r) || isNotGonggu(r) || isAffiliate(r);
}

async function poll() {
  const res = await fetch('/api/status');
  const data = await res.json();
  render(data);
  setTimeout(poll, 1500);
}

function render(data) {
  const counts = {};
  data.forEach(r => counts[r.status] = (counts[r.status]||0) + 1);
  const unresolvedNoise = data.filter(r => r.status === 'unresolved' && isNoise(r)).length;
  const unresolvedReal = (counts.unresolved || 0) - unresolvedNoise;
  const statLine = Object.entries(counts).map(([k, v]) => {
    if (k === 'unresolved') {
      return `<span><b>${v}</b> unresolved <span style="opacity:.7">(노이즈 ${unresolvedNoise} / 실패 ${unresolvedReal})</span></span>`;
    }
    return `<span><b>${v}</b> ${k}</span>`;
  }).join('');
  document.getElementById('stats').innerHTML =
    `<span><b>${data.length}</b> 전체</span>` + statLine;

  const filters = ['all', 'pending', 'in_progress', 'done', 'error', 'unresolved', 'hold'];
  document.getElementById('filters').innerHTML =
    filters.map(f => `<button data-f="${f}" class="${f===currentFilter?'active':''}">${f}</button>`).join('');
  document.querySelectorAll('.filters button[data-f]').forEach(b =>
    b.onclick = () => { currentFilter = b.dataset.f; render(data); });

  const hideOptions = [
    { key: 'hideStageSkipped', label: '예고·마감 숨기기', count: data.filter(isStageSkipped).length, get: () => hideStageSkipped, set: v => hideStageSkipped = v },
    { key: 'hideNoLink', label: '링크 없음 숨기기', count: data.filter(isNoLink).length, get: () => hideNoLink, set: v => hideNoLink = v },
    { key: 'hideNotGonggu', label: '공구 아닌 게시물 숨기기', count: data.filter(isNotGonggu).length, get: () => hideNotGonggu, set: v => hideNotGonggu = v },
    { key: 'hideAffiliate', label: '제휴 광고성 숨기기', count: data.filter(isAffiliate).length, get: () => hideAffiliate, set: v => hideAffiliate = v },
  ];
  document.getElementById('hideDropdown').innerHTML =
    `<button class="dropdown-btn ${hidePanelOpen?'open':''}" id="hideDropdownBtn">노이즈 숨기기 ▾</button>` +
    (hidePanelOpen ? `<div class="dropdown-panel">${hideOptions.map(o => `
      <div class="toggle-row">
        <span>${o.label} (${o.count})</span>
        <label class="switch">
          <input type="checkbox" data-key="${o.key}" ${o.get() ? 'checked' : ''}>
          <span class="slider"></span>
        </label>
      </div>
    `).join('')}</div>` : '');
  document.getElementById('hideDropdownBtn').onclick = () => { hidePanelOpen = !hidePanelOpen; render(data); };
  hideOptions.forEach(o => {
    const el = document.querySelector(`input[data-key="${o.key}"]`);
    if (el) el.onchange = () => { o.set(el.checked); render(data); };
  });

  const rows = data
    .filter(r => currentFilter === 'all' || r.status === currentFilter)
    .filter(r => !hideStageSkipped || !isStageSkipped(r))
    .filter(r => !hideNoLink || !isNoLink(r))
    .filter(r => !hideNotGonggu || !isNotGonggu(r))
    .filter(r => !hideAffiliate || !isAffiliate(r));
  document.getElementById('rows').innerHTML = rows.map(r => `
    <tr>
      <td><span class="plat ${r.platform}">${r.platform === 'instagram' ? 'IG' : 'YT'}</span></td>
      <td><a href="${r.original_url}" target="_blank">${r.id}</a><div class="desc">${escapeHtml(r.desc_preview||'')}</div></td>
      <td class="desc">${escapeHtml(r.product_hint||'-')}</td>
      <td>${renderPeriod(r.period_start, r.period_end)}</td>
      <td><div class="tag">${r.link_location||'-'}</div><div class="tag">${r.url_type||'-'}</div></td>
      <td><span class="status ${r.status}">${r.status}</span>${r.error ? `<div class="tag" style="color:#f77">${escapeHtml(r.error)}</div>` : ''}</td>
      <td>${(r.hops||[]).map(h => `<div class="hop"><b>${h.step}</b> ${escapeHtml((h.url||h.note||'').slice(0,60))}</div>`).join('') || '-'}</td>
      <td>${renderFinal(r.final, r.id)}</td>
      <td class="updated">${r.updated_at||''}</td>
    </tr>
  `).join('');
}

function renderPeriod(start, end) {
  if (!start && !end) return '<span class="tag">-</span>';
  return `<span class="tag">${start||'?'} ~ ${end||'?'}</span>`;
}

function renderFinal(final, id) {
  if (!final || !Object.keys(final).length) return '-';
  const parts = [];
  if (final.image_saved) parts.push(`<img class="thumb" src="/media/${id}.jpg">`);
  if (final.final_url) parts.push(`<a href="${final.final_url}" target="_blank">${final.final_url.slice(0,45)}</a>`);
  if (final.price) parts.push(`<div class="tag">💰 ${final.price}</div>`);
  if (final.name) parts.push(`<div class="tag">${escapeHtml(final.name)}</div>`);
  return parts.join('<br>');
}

function escapeHtml(s) {
  return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

poll();
</script>
</body>
</html>
